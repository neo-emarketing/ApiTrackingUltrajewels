    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mapa de Disponibilidad - COBASELVA MAYA</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }

            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: #f5f7fa;
                padding: 10px;
            }

            .container {
                max-width: 1200px;
                margin: 0 auto;
                background: white;
                border-radius: 12px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.1);
                overflow: hidden;
            }

            .header {
                background: linear-gradient(135deg, #2d5016 0%, #4a7c28 50%, #2d5016 100%);
                color: white;
                padding: 25px;
                text-align: center;
            }

            .header h1 { font-size: 2.2em; margin-bottom: 5px; }
            .header p { font-size: 1em; opacity: 0.9; margin-bottom: 15px; }

            .legend {
                display: flex;
                justify-content: center;
                gap: 30px;
                flex-wrap: wrap;
            }

            .legend-item {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 0.95em;
            }

            .legend-color {
                width: 25px;
                height: 25px;
                border-radius: 4px;
                border: 2px solid rgba(255,255,255,0.5);
            }

            /* === TABS DE ETAPAS === */
            .etapas-tabs {
                display: flex;
                justify-content: center;
                gap: 0;
                background: #e8e8e8;
                border-bottom: 2px solid #ddd;
            }

            .etapa-tab {
                padding: 12px 28px;
                border: none;
                background: transparent;
                cursor: pointer;
                font-weight: bold;
                font-size: 0.95em;
                color: #555;
                transition: all 0.3s ease;
                border-bottom: 3px solid transparent;
                position: relative;
            }

            .etapa-tab:hover {
                background: rgba(74, 124, 40, 0.1);
                color: #2d5016;
            }

            .etapa-tab.active {
                background: white;
                color: #2d5016;
                border-bottom: 3px solid #4a7c28;
            }

            .etapa-tab .tab-count {
                display: inline-block;
                background: #4a7c28;
                color: white;
                border-radius: 10px;
                padding: 1px 7px;
                font-size: 0.75em;
                margin-left: 5px;
                vertical-align: middle;
            }

            .content {
                display: flex;
                gap: 20px;
                padding: 20px;
            }

            .map-container {
                flex: 1;
                background: #fafafa;
                border-radius: 8px;
                padding: 15px;
                border: 1px solid #e0e0e0;
                overflow: hidden;
                min-height: 400px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .map-container svg {
                width: 100%;
                height: auto;
                display: block;
                transition: all 0.4s ease;
            }

            .lote {
                cursor: pointer;
                transition: opacity 0.3s ease, filter 0.3s ease;
            }

            .lote:hover {
                opacity: 0.75 !important;
                filter: drop-shadow(0 0 6px rgba(0,0,0,0.4));
            }

            .sidebar {
                width: 280px;
                min-width: 280px;
                background: #fafafa;
                border-radius: 8px;
                padding: 15px;
                border: 1px solid #e0e0e0;
                max-height: 550px;
                overflow-y: auto;
            }

            .info-panel {
                background: white;
                border-radius: 8px;
                padding: 15px;
                margin-bottom: 12px;
                border-left: 4px solid #4a7c28;
            }

            .info-panel h3 { color: #333; margin-bottom: 8px; font-size: 1.1em; }
            .info-panel p { color: #555; font-size: 0.9em; margin-bottom: 6px; line-height: 1.5; }

            .status-badge {
                display: inline-block;
                padding: 4px 12px;
                border-radius: 20px;
                font-size: 0.8em;
                font-weight: bold;
                text-transform: uppercase;
            }

            .status-available { background: #d4edda; color: #155724; }
            .status-reserved { background: #fff3cd; color: #856404; }
            .status-sold { background: #f8d7da; color: #721c24; }

            .controls {
                padding: 12px 20px;
                background: #f5f5f5;
                border-top: 1px solid #e0e0e0;
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                justify-content: center;
            }

            button {
                padding: 8px 18px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
                transition: all 0.3s ease;
                font-size: 0.9em;
            }

            .btn-filter { background: #4a7c28; color: white; }
            .btn-filter:hover { background: #3a6220; transform: translateY(-1px); }
            .btn-filter.active { background: #2d5016; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
            .btn-reset { background: #6c757d; color: white; }
            .btn-reset:hover { background: #5a6268; }

            .stats {
                background: #fafafa;
                padding: 15px 20px;
                border-top: 1px solid #e0e0e0;
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
                gap: 15px;
                text-align: center;
            }

            .stat-box {
                padding: 12px;
                background: white;
                border-radius: 8px;
                border: 1px solid #e0e0e0;
            }

            .stat-box .number { font-size: 1.8em; font-weight: bold; color: #4a7c28; }
            .stat-box .label { font-size: 0.8em; color: #666; text-transform: uppercase; }

            .btn-contact {
                display: block;
                width: 100%;
                margin-top: 12px;
                padding: 10px;
                background: #4a7c28;
                color: white;
                border: none;
                border-radius: 6px;
                font-size: 0.95em;
                cursor: pointer;
                text-align: center;
                text-decoration: none;
            }
            .btn-contact:hover { background: #3a6220; }

            .etapa-label {
                text-align: center;
                padding: 8px;
                font-size: 0.85em;
                color: #888;
                border-top: 1px solid #eee;
            }

            @media (max-width: 768px) {
                .content { flex-direction: column; }
                .sidebar { width: 100%; min-width: unset; max-height: 300px; }
                .header h1 { font-size: 1.6em; }
                .legend { gap: 15px; }
                .etapa-tab { padding: 10px 14px; font-size: 0.85em; }
            }

            /* === COLORES DE ESTADOS === */
            .available { fill: #28a745 !important; fill-opacity: 0.7 !important; }
            .reserved  { fill: #ffc107 !important; fill-opacity: 0.7 !important; }
            .sold      { fill: #dc3545 !important; fill-opacity: 0.7 !important; }
        </style>

                path7:   { id: 'path7',   status: 'available',  number: 'C-29', price: '$42,000 USD', area: '180 m2', etapa: 4 },
                path6:   { id: 'path6',   status: 'available', number: 'C-30', price: '$42,000 USD', area: '180 m2', etapa: 4 },
                path5:   { id: 'path5',   status: 'available', number: 'C-31', price: '$42,000 USD', area: '180 m2', etapa: 4 },
                path4:   { id: 'path4',   status: 'available', number: 'C-32', price: '$42,000 USD', area: '180 m2', etapa: 4 },
                path3:   { id: 'path3',   status: 'available',      number: 'C-33', price: '$42,000 USD', area: '180 m2', etapa: 4 },
                path2:   { id: 'path2',   status: 'sold', number: 'C-34', price: '$42,000 USD', area: '180 m2', etapa: 4 },
                path34:  { id: 'path34',  status: 'sold', number: 'C-35', price: '$42,000 USD', area: '180 m2', etapa: 1 },
            };

            // =====================================================
            // FUNCIONES - NO EDITAR
            // =====================================================

            function changeEtapa(index) {
                const svg = document.getElementById('svg1');
                const tabs = document.querySelectorAll('.etapa-tab');

                tabs.forEach(t => t.classList.remove('active'));

                if (index === -1) {
                    // Ver todo
                    svg.setAttribute('viewBox', fullViewBox);
                    tabs[4].classList.add('active');
                    currentEtapa = -1;
                } else {
                    svg.setAttribute('viewBox', etapas[index].viewBox);
                    tabs[index].classList.add('active');
                    currentEtapa = index;
                }

                updateStats();
            }

            function initializeMap() {
                Object.entries(lotsData).forEach(([key, lotData]) => {
                    const element = document.getElementById(lotData.id);
                    if (element) {
                        element.classList.add('lote', lotData.status);
                        element.addEventListener('click', () => showLotInfo(lotData));
                    }
                });
                updateTabCounts();
                updateStats();
            }

            function updateTabCounts() {
                const tabs = document.querySelectorAll('.etapa-tab');
                for (let i = 0; i < 4; i++) {
                    const count = Object.values(lotsData).filter(l => l.etapa === (i + 1)).length;
                    tabs[i].innerHTML = `Etapa ${i + 1} <span class="tab-count">${count}</span>`;
                }
                const total = Object.keys(lotsData).length;
                tabs[4].innerHTML = `Ver Todo <span class="tab-count">${total}</span>`;
            }

            function showLotInfo(lotData) {
                const statusLabels = { 'available': 'Disponible', 'reserved': 'Reservado', 'sold': 'Vendido' };
                const statusClass  = { 'available': 'status-available', 'reserved': 'status-reserved', 'sold': 'status-sold' };

                let html = `
                    <div class="info-panel">
                        <h3>Lote ${lotData.number}</h3>
                        <p><strong>Etapa:</strong> ${lotData.etapa}</p>
                        <p><strong>Estado:</strong> <span class="status-badge ${statusClass[lotData.status]}">${statusLabels[lotData.status]}</span></p>
                        <p><strong>Area:</strong> ${lotData.area}</p>
                `;

                if (lotData.status === 'available') {
                    html += `<a class="btn-contact" href="#contacto">Solicitar Informacion</a>`;
                }

                html += `</div>`;
                document.getElementById('sidebarContent').innerHTML = html;
            }

            function filterLots(status) {
                document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
                document.getElementById('btn' + status.charAt(0).toUpperCase() + status.slice(1)).classList.add('active');

                document.querySelectorAll('.lote').forEach(lot => {
                    if (lot.classList.contains(status)) {
                        lot.style.opacity = '1';
                        lot.style.pointerEvents = 'auto';
                    } else {
                        lot.style.opacity = '0.15';
                        lot.style.pointerEvents = 'none';
                    }
                });
            }

            function resetFilter() {
                document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
                document.querySelectorAll('.lote').forEach(lot => {
                    lot.style.opacity = '1';
                    lot.style.pointerEvents = 'auto';
                });
            }

            function updateStats() {
                let a = 0, r = 0, s = 0;
                const etapaFilter = currentEtapa >= 0 ? currentEtapa + 1 : null;

                Object.values(lotsData).forEach(lot => {
                    if (etapaFilter && lot.etapa !== etapaFilter) return;
                    if (lot.status === 'available') a++;
                    else if (lot.status === 'reserved') r++;
                    else if (lot.status === 'sold') s++;
                });

                document.getElementById('statAvailable').textContent = a;
                document.getElementById('statReserved').textContent = r;
                document.getElementById('statSold').textContent = s;
                document.getElementById('statTotal').textContent = a + r + s;
            }

            document.addEventListener('DOMContentLoaded', initializeMap);
        </script>
    </body>
    </html>
